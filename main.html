<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта — Исправленная версия</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; }
        #map { height: 100vh; width: 100%; background: #f0f0f0; }

        .ui-panel {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: white; padding: 12px 24px;
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            pointer-events: none; /* Чтобы панель не мешала кликать по карте */
        }

        /* Стильный маркер */
        .marker-pin {
            width: 24px; height: 24px; background: #007bff;
            border: 3px solid white; border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg); box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Попап */
        .popup-content { padding: 5px; min-width: 140px; }
        .popup-info { font-size: 12px; margin-bottom: 8px; color: #444; line-height: 1.4; }
        .btn-del {
            width: 100%; background: #ff4d4d; color: white; border: none;
            padding: 6px; border-radius: 4px; cursor: pointer; font-weight: 600;
        }
        .btn-del:hover { background: #ff3333; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <b>Просто кликни в любом месте карты</b>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Инициализация. Центрируем на Казахстане (Караганда для примера)
        const map = L.map('map', {
            tap: false // Отключаем задержку тапа для мобильных (частая причина багов клика)
        }).setView([49.80, 73.10], 12);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        // Иконка
        const myIcon = L.divIcon({
            className: 'custom-icon',
            html: '<div class="marker-pin"></div>',
            iconSize: [24, 24],
            iconAnchor: [12, 24],
            popupAnchor: [0, -24]
        });

        // 2. Функция создания метки
        function addMarker(latlng) {
            const marker = L.marker(latlng, {
                icon: myIcon,
                draggable: true
            }).addTo(map);

            // Функция обновления контента попапа
            const updatePopup = (m) => {
                const pos = m.getLatLng();
                const container = document.createElement('div');
                container.className = 'popup-content';
                
                container.innerHTML = `
                    <div class="popup-info">
                        <strong>Координаты:</strong><br>
                        ${pos.lat.toFixed(5)}, ${pos.lng.toFixed(5)}
                    </div>
                `;

                const delBtn = document.createElement('button');
                delBtn.innerText = 'Удалить';
                delBtn.className = 'btn-del';
                delBtn.onclick = () => map.removeLayer(marker);

                container.appendChild(delBtn);
                m.bindPopup(container).openPopup();
            };

            // Вызываем сразу при создании
            updatePopup(marker);

            // Обновляем при перемещении
            marker.on('dragend', () => updatePopup(marker));
        }

        // 3. ГЛАВНОЕ: Слушаем клик по карте
        map.on('click', function(e) {
            console.log("Клик зафиксирован:", e.latlng); // Проверь это в консоли (F12)
            addMarker(e.latlng);
        });

        // Добавим одну метку сразу для проверки
        addMarker([49.80, 73.10]);
    </script>
</body>
</html>
